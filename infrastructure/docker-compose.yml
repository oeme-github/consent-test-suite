version: "3.8"

# FHIR Consent Testumgebung – alle drei Server
# Versionen IMMER explizit angeben, niemals 'latest'
# Versionsupgrades = expliziter PR mit Testlauf

services:

  # ── HAPI FHIR ──────────────────────────────────────────────────────────────
  hapi:
    image: hapiproject/hapi:v7.4.0
    container_name: consent-test-hapi
    ports:
      - "8080:8080"
    environment:
      hapi.fhir.fhir_version: R4
      hapi.fhir.validation.enabled: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/fhir/metadata"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Blaze ──────────────────────────────────────────────────────────────────
  blaze:
    image: samply/blaze:1.7.0
    container_name: consent-test-blaze
    ports:
      - "8081:8080"
    environment:
      BASE_URL: "http://localhost:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── MongoDB (Backend für Spark FHIR) ───────────────────────────────────────
  spark-mongo:
    image: mongo:7.0
    container_name: consent-test-spark-mongo
    environment:
      MONGO_INITDB_DATABASE: spark

  # ── Spark FHIR (Incendi/Firely Open Source) ────────────────────────────────
  # Open-Source-Ersatz für Firely Server (keine Lizenz erforderlich).
  # FHIR-Basis: http://localhost:8082/fhir
  # Hinweis: r4-latest ist der einzige stabile Tag für R4.
  spark:
    image: sparkfhir/spark:r4-latest
    container_name: consent-test-spark
    ports:
      - "8082:80"
    environment:
      StoreSettings__ConnectionString: "mongodb://spark-mongo:27017/spark"
    depends_on:
      - spark-mongo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/fhir/metadata"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# ── Netzwerk ────────────────────────────────────────────────────────────────
networks:
  default:
    name: consent-test-network

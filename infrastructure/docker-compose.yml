version: "3.8"

# FHIR Consent Testumgebung – alle drei Server
# Versionen IMMER explizit angeben, niemals 'latest'
# Versionsupgrades = expliziter PR mit Testlauf

services:

  # ── HAPI FHIR ──────────────────────────────────────────────────────────────
  hapi:
    image: hapiproject/hapi:v7.4.0
    container_name: consent-test-hapi
    ports:
      - "8080:8080"
    environment:
      hapi.fhir.fhir_version: R4
      hapi.fhir.validation.enabled: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/fhir/metadata"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Blaze ──────────────────────────────────────────────────────────────────
  blaze:
    image: samply/blaze:1.7.0
    container_name: consent-test-blaze
    ports:
      - "8081:8080"
    environment:
      BASE_URL: "http://localhost:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Firely Server ──────────────────────────────────────────────────────────
  # WICHTIG: Firely Server benötigt eine Lizenzdatei (auch Community/Evaluation).
  # Lizenz beantragen: https://fire.ly/products/firely-server
  # Lizenzdatei unter infrastructure/firely-license.json ablegen (in .gitignore).
  # Ohne Lizenzdatei startet der Container nicht (KI-004).
  firely:
    image: firely/server:5.9.1
    container_name: consent-test-firely
    ports:
      - "8082:4080"
    environment:
      FHIR__R4__ENABLED: "true"
    volumes:
      - ./firely-license.json:/app/firelyserver-license.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4080/metadata"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

# ── Netzwerk ────────────────────────────────────────────────────────────────
networks:
  default:
    name: consent-test-network

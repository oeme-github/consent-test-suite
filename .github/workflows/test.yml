name: FHIR Consent Testumgebung – CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:

  # ── Fixtures validieren (offline, schnell) ─────────────────────────────────
  validate-fixtures:
    name: Fixtures validieren
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JSON-Syntax und FHIR-Pflichtfelder prüfen
        run: |
          python3 - <<'EOF'
          import json, sys, pathlib

          errors = []

          # JSON-Syntax: alle Fixtures und SearchParameter
          for p in [
              *pathlib.Path("fixtures").rglob("*.json"),
              *pathlib.Path("infrastructure/searchparameters").rglob("*.json"),
          ]:
              try:
                  d = json.loads(p.read_text())
              except Exception as e:
                  errors.append(f"{p}: ungültiges JSON – {e}")
                  continue

              # Pflichtfelder nur für valide Fixtures und SearchParameter prüfen
              if "invalid" not in str(p):
                  if "resourceType" not in d:
                      errors.append(f"{p}: fehlendes 'resourceType'")
                  elif d.get("resourceType") not in ("Bundle", "Parameters") and "id" not in d:
                      errors.append(f"{p}: fehlendes 'id'")

          for e in errors:
              print(f"❌  {e}")
          sys.exit(1 if errors else 0)
          EOF

  # ── Tests gegen HAPI FHIR ─────────────────────────────────────────────────
  test-hapi:
    name: Tests → HAPI FHIR v7.4.0
    runs-on: ubuntu-latest
    needs: validate-fixtures
    services:
      hapi:
        image: hapiproject/hapi:v7.4.0
        ports:
          - 8080:8080
        # Kein container-seitiger health-check: HAPI hat kein curl im Image und
        # braucht in CI-Umgebungen bis zu 5 min. Wait-Step auf dem Host-Runner.

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Warten bis HAPI bereit (max 8 min)
        run: |
          echo "Warte auf HAPI FHIR..."
          for i in $(seq 1 48); do
            if curl -sf http://localhost:8080/fhir/metadata > /dev/null 2>&1; then
              echo "✅ Bereit nach ca. $((i * 10))s"
              exit 0
            fi
            echo "  Versuch $i/48 – warte 10s..."
            sleep 10
          done
          echo "❌ Timeout nach 480s"
          exit 1

      - name: Newman installieren
        run: npm install -g newman newman-reporter-junitfull

      - name: Fixtures laden
        run: bash infrastructure/setup.sh hapi
        env:
          FHIR_BASE_HAPI: http://localhost:8080/fhir

      - name: Tests ausführen
        run: |
          mkdir -p results
          newman run tests/search/collection.json \
            --env-var "baseUrl=http://localhost:8080/fhir" \
            --reporters cli,junitfull \
            --reporter-junitfull-export results/hapi.xml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-hapi
          path: results/hapi.xml

  # ── Tests gegen Blaze ─────────────────────────────────────────────────────
  # Bekannte Fehler: KI-002 (Nested SP), KI-006 (Stale Index nach PUT)
  test-blaze:
    name: Tests → Blaze 1.7.0
    runs-on: ubuntu-latest
    needs: validate-fixtures
    continue-on-error: true
    services:
      blaze:
        image: samply/blaze:1.7.0
        ports:
          - 8081:8080
        env:
          BASE_URL: http://localhost:8081
        options: >-
          --health-cmd "curl -f http://localhost:8080/health"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 90s

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Newman installieren
        run: npm install -g newman newman-reporter-junitfull

      - name: Fixtures laden
        run: bash infrastructure/setup.sh blaze
        env:
          FHIR_BASE_BLAZE: http://localhost:8081/fhir

      - name: Tests ausführen
        run: |
          mkdir -p results
          newman run tests/search/collection.json \
            --env-var "baseUrl=http://localhost:8081/fhir" \
            --reporters cli,junitfull \
            --reporter-junitfull-export results/blaze.xml
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-blaze
          path: results/blaze.xml

  # ── Tests gegen Spark FHIR ────────────────────────────────────────────────
  # Bekannte Fehler: KI-005 (Nested SP, OperationOutcome), KI-006 (Stale Index)
  test-spark:
    name: Tests → Spark FHIR r4-latest
    runs-on: ubuntu-latest
    needs: validate-fixtures
    continue-on-error: true
    services:
      spark-mongo:
        image: mongo:7.0
        # MongoDB startet in <10s – kein health-check nötig
      spark:
        image: sparkfhir/spark:r4-latest
        ports:
          - 8082:80
        env:
          StoreSettings__ConnectionString: mongodb://spark-mongo:27017/spark
        # Kein container-seitiger health-check: Spark (ASP.NET) hat kein curl im
        # Basisimage. MongoDB und Spark starten parallel; Spark wartet intern auf
        # MongoDB via Retry-Logik. Wait-Step auf dem Host-Runner.

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Warten bis Spark bereit (max 8 min)
        run: |
          echo "Warte auf Spark FHIR..."
          for i in $(seq 1 48); do
            if curl -sf http://localhost:8082/fhir/metadata > /dev/null 2>&1; then
              echo "✅ Bereit nach ca. $((i * 10))s"
              exit 0
            fi
            echo "  Versuch $i/48 – warte 10s..."
            sleep 10
          done
          echo "❌ Timeout nach 480s"
          exit 1

      - name: Newman installieren
        run: npm install -g newman newman-reporter-junitfull

      - name: Fixtures laden
        run: bash infrastructure/setup.sh spark
        env:
          FHIR_BASE_SPARK: http://localhost:8082/fhir

      - name: Tests ausführen
        run: |
          mkdir -p results
          newman run tests/search/collection.json \
            --env-var "baseUrl=http://localhost:8082/fhir" \
            --reporters cli,junitfull \
            --reporter-junitfull-export results/spark.xml
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-spark
          path: results/spark.xml

  # ── Testergebnis-Zusammenfassung ──────────────────────────────────────────
  summary:
    name: Zusammenfassung
    runs-on: ubuntu-latest
    needs: [test-hapi, test-blaze, test-spark]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: results/

      - name: GitHub Step Summary schreiben
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, pathlib, os

          servers = [
              ("hapi",  "HAPI FHIR v7.4.0",  ""),
              ("blaze", "Blaze 1.7.0",        "KI-002, KI-006"),
              ("spark", "Spark r4-latest",    "KI-005, KI-006"),
          ]

          lines = [
              "## FHIR Consent CI – Testergebnisse\n",
              "| Server | Tests | ✅ Pass | ❌ Fail | Bekannte Issues |",
              "|---|---:|---:|---:|---|",
          ]

          for key, label, known in servers:
              hits = list(pathlib.Path("results").rglob(f"{key}.xml"))
              if not hits:
                  lines.append(f"| {label} | – | – | – | ⚠️ keine Ergebnisse |")
                  continue
              tree = ET.parse(hits[0])
              root = tree.getroot()
              suites = root.findall("testsuite") if root.tag == "testsuites" else [root]
              total    = sum(int(s.get("tests",    0)) for s in suites)
              failures = sum(int(s.get("failures", 0)) + int(s.get("errors", 0)) for s in suites)
              passed   = total - failures
              icon     = "✅" if failures == 0 else "❌"
              lines.append(f"| {icon} {label} | {total} | {passed} | {failures} | {known or '–'} |")

          lines += [
              "",
              "Bekannte Serverunterschiede: `tests/server-specific/known-issues.md`",
          ]

          with open(os.environ["GITHUB_STEP_SUMMARY"], "w") as f:
              f.write("\n".join(lines) + "\n")
          EOF

      - name: JUnit Report publizieren
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: FHIR Consent Tests (alle Server)
          path: "results/**/*.xml"
          reporter: java-junit
          fail-on-error: "false"
